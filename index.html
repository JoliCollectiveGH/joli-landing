<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JOLI Collective — Find places to stay</title>
  <link rel="icon" type="image/png" href="https://vzjcbnlsfkpigrdfrifx.supabase.co/storage/v1/object/public/Assets/JOLI_Symbol_Black.png" />
  <meta name="description" content="Too many options. Not enough taste. MILO is an AI travel copilot that finds remarkable, design-led stays across Europe — handpicked for character, not volume." />
  <meta property="og:title" content="JOLI Collective" />
  <meta property="og:description" content="Too many options. Not enough taste. Meet MILO." />
  <meta property="og:image" content="https://vzjcbnlsfkpigrdfrifx.supabase.co/storage/v1/object/public/Assets/hero_poster.jpg" />

  <style>
    @font-face {
      font-family: 'Monument Grotesk';
      src: url('https://vzjcbnlsfkpigrdfrifx.supabase.co/storage/v1/object/public/Assets/ABCMonumentGrotesk-Light-Trial.woff2') format('woff2');
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Monument Grotesk';
      src: url('https://vzjcbnlsfkpigrdfrifx.supabase.co/storage/v1/object/public/Assets/ABCMonumentGrotesk-Regular-Trial.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Monument Grotesk';
      src: url('https://vzjcbnlsfkpigrdfrifx.supabase.co/storage/v1/object/public/Assets/ABCMonumentGrotesk-RegularItalic-Trial.woff2') format('woff2');
      font-weight: 400;
      font-style: italic;
      font-display: swap;
    }

    @font-face {
      font-family: 'Monument Grotesk';
      src: url('https://vzjcbnlsfkpigrdfrifx.supabase.co/storage/v1/object/public/Assets/ABCMonumentGrotesk-Medium-Trial.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Monument Grotesk';
      src: url('https://vzjcbnlsfkpigrdfrifx.supabase.co/storage/v1/object/public/Assets/ABCMonumentGrotesk-MediumItalic-Trial.woff2') format('woff2');
      font-weight: 500;
      font-style: italic;
      font-display: swap;
    }

    :root {
      --brand: #AD531B;
      --brand-dark: #8B4316;
      --brand-light: rgba(173, 83, 27, 0.08);
      --ink: #1A1814;
      --ink-muted: #6B6560;
      --ink-faint: #A8A39E;
      --surface: #F7F6F2;
      --surface-warm: #F0EDE6;
      --white: #FFFFFF;
      --border: rgba(26, 24, 20, 0.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Monument Grotesk', -apple-system, sans-serif;
      background: var(--surface);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ─── NAV ─────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(247, 246, 242, 0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      transition: opacity 0.4s ease, box-shadow 0.3s ease;
    }

    nav.nav-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo img { height: 28px; width: auto; image-rendering: auto; }

    .nav-links { display: flex; align-items: center; gap: 32px; }

    .nav-links a {
      font-size: 13px;
      font-weight: 400;
      color: var(--ink-muted);
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: color 0.15s;
    }

    .nav-links a:hover { color: var(--ink); }

    .nav-cta {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink) !important;
      background: none;
      padding: 0;
      border: none;
      cursor: pointer;
      transition: color 0.15s !important;
      letter-spacing: 0.01em;
      font-family: inherit;
    }

    .nav-cta:hover { color: var(--brand) !important; background: none !important; }

    /* ─── INTRO SCREEN ────────────────────────────────── */
    #intro {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #intro-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #intro-overlay {
      position: absolute;
      inset: 0;
      background: rgba(14, 11, 8, 0.40);
    }

    #intro-symbol {
      position: relative;
      z-index: 1;
      width: clamp(80px, 12vw, 160px);
      height: auto;
      opacity: 0;
      animation: symbolFade 1.2s 0.5s ease forwards;
      filter: brightness(0) invert(1) opacity(0.55);
    }

    #intro-scroll {
      position: absolute;
      bottom: 44px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      animation: symbolFade 1s 2s ease forwards;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }

    #intro-scroll span {
      font-family: 'Monument Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
    }

    #intro-scroll svg {
      animation: arrowBounce 2s 2.5s ease-in-out infinite;
    }

    @keyframes arrowBounce {
      0%, 100% { transform: translateY(0); opacity: 0.38; }
      50% { transform: translateY(7px); opacity: 0.7; }
    }

    @keyframes symbolFade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ─── HERO ────────────────────────────────────────── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 40px 80px;
      text-align: center;
      position: relative;
      overflow: hidden;
      background: var(--ink);
    }

    .hero-eyebrow {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(240, 220, 200, 0.45);
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 0.7s 0.1s ease forwards;
      position: relative; z-index: 1;
    }
    .hero-headline {
      font-family: 'Monument Grotesk', Georgia, sans-serif;
      font-size: clamp(32px, 4vw, 58px);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.03em;
      max-width: 820px;
      color: var(--white);
      margin: 0 auto 36px;
      opacity: 0;
      animation: fadeUp 0.8s 0.25s ease forwards;
      position: relative; z-index: 1;
    }

    .hero-headline em {
      font-style: italic;
      color: rgba(213, 140, 80, 0.95);
    }

    .hero-sub {
      font-size: 16px;
      font-weight: 300;
      line-height: 1.75;
      max-width: 600px;
      color: rgba(255,255,255,0.42);
      margin: 0 auto 56px;
      opacity: 0;
      animation: fadeUp 0.8s 0.35s ease forwards;
      position: relative; z-index: 1;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.8s 0.45s ease forwards;
      position: relative; z-index: 1;
    }

    .hero-note {
      margin-top: 28px;
      font-size: 12px;
      color: rgba(255,255,255,0.20);
      opacity: 0;
      animation: fadeUp 0.8s 0.55s ease forwards;
      position: relative; z-index: 1;
    }

    /* ─── BUTTONS ─────────────────────────────────────── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: var(--brand);
      color: var(--white);
      font-family: 'Monument Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border-radius: 100px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.01em;
    }

    .btn-primary:hover {
      background: var(--brand-dark);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(173, 83, 27, 0.25);
    }

    .btn-primary-light {
      background: var(--white) !important;
      color: var(--ink) !important;
    }

    .btn-primary-light:hover {
      background: rgba(255,255,255,0.90) !important;
      color: var(--ink) !important;
      box-shadow: 0 8px 24px rgba(0,0,0,0.20) !important;
    }

    .btn-ghost-light {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 24px;
      background: transparent;
      color: rgba(255,255,255,0.65) !important;
      font-family: 'Monument Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 400;
      border-radius: 100px;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.20);
      transition: all 0.2s ease;
    }

    .btn-ghost-light:hover {
      color: var(--white) !important;
      border-color: rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.07) !important;
    }

    /* ─── MILO OVERLAY CSS ───────────────────────────── */
    #milo-container {
      position: fixed; bottom: 30px; right: 30px; width: 360px; 
      background: #FFFFFF; border: 1px solid rgba(0,0,0,0.08); 
      border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
      z-index: 10000; display: none; flex-direction: column;
      font-family: 'Monument Grotesk', sans-serif;
    }
    #milo-header { 
      padding: 14px 20px; background: #1A1814; color: white; 
      display: flex; justify-content: space-between; align-items: center;
      border-radius: 15px 15px 0 0; font-size: 10px; 
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    #milo-body { 
      padding: 20px; font-size: 14px; line-height: 1.6; 
      color: #1A1814; max-height: 350px; overflow-y: auto; 
    }
    .milo-cursor { display: inline-block; width: 2px; height: 15px; background: #AD531B; margin-left: 4px; animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

    /* ─── REMAINING UTILS ──────────────────────────────── */
    .reveal { opacity: 0; transform: translateY(32px); transition: opacity 1.1s cubic-bezier(0.16, 1, 0.3, 1), transform 1.1s cubic-bezier(0.16, 1, 0.3, 1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div id="intro">
  <video id="intro-video" autoplay muted loop playsinline preload="auto" poster="https://vzjcbnlsfkpigrdfrifx.supabase.co/storage/v1/object/public/Assets/hero_poster.jpg">
    <source src="https://vzjcbnlsfkpigrdfrifx.supabase.co/storage/v1/object/public/Assets/Joli_Texture_06.mp4" type="video/mp4" />
  </video>
  <div id="intro-overlay"></div>
  <img id="intro-symbol" src="https://vzjcbnlsfkpigrdfrifx.supabase.co/storage/v1/object/public/Assets/JOLI_Symbol_Black.svg" alt="JOLI" />
  <button id="intro-scroll" onclick="document.getElementById('hero').scrollIntoView({behavior:'smooth'})" aria-label="Scroll to content">
    <span>Scroll</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5">
      <path d="M12 5v14M5 12l7 7 7-7"/>
    </svg>
  </button>
</div>

<nav id="main-nav" class="nav-hidden">
  <a href="/" class="nav-logo">
    <img src="https://vzjcbnlsfkpigrdfrifx.supabase.co/storage/v1/object/public/Assets/JOLI_Lockup_Black.svg" alt="JOLI Collective" />
  </a>
  <div class="nav-links">
    <a href="#how-it-works">How it works</a>
    <a href="#membership">Membership</a>
    <a href="#concierge">Concierge</a>
    <button onclick="askMilo('Tell me about the JOLI collection')" class="nav-cta">Try MILO free</button>
  </div>
</nav>

<section class="hero" id="hero">
  <p class="hero-eyebrow">MILO — A travel copilot by JOLI Collective</p>
  <h1 class="hero-headline">Find places to stay.<br><em>Without the scrolling.</em></h1>
  <p class="hero-sub">A handpicked collection of design-led stays, found through conversation.</p>
  <div class="hero-actions">
    <button onclick="askMilo('Find me a design-led stay in Tuscany')" class="btn-primary btn-primary-light">
      Try MILO free
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
    <a href="#membership" class="btn-ghost-light">Become a member</a>
  </div>
  <p class="hero-note">Free to start · No credit card required</p>
</section>

<div id="milo-container">
  <div id="milo-header">
    <span>Milo — AI Copilot</span>
    <button onclick="document.getElementById('milo-container').style.display='none'" style="background:none; border:none; color:white; cursor:pointer; font-size: 16px;">✕</button>
  </div>
  <div id="milo-body"><div id="milo-text"></div></div>
</div>

<script>
  // MILO LOGIC
  async function askMilo(query) {
    const container = document.getElementById('milo-container');
    const textField = document.getElementById('milo-text');
    
    container.style.display = 'flex';
    textField.innerHTML = "Consulting the JOLI collection...<span class='milo-cursor'></span>";

    try {
      const response = await fetch('https://joli-app.vercel.app/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          user_message: query,
          anonymous_id: 'landing_visitor',
          session_id: 'preview'
        })
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      textField.innerHTML = ""; 

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        textField.innerHTML += decoder.decode(value);
      }
    } catch (e) {
      textField.innerHTML = "Milo is momentarily offline. Please try again shortly.";
    }
  }

  // SCROLL EFFECTS
  window.addEventListener('scroll', () => {
    const nav = document.getElementById('main-nav');
    const hero = document.getElementById('hero');
    if (window.scrollY > 100) {
      nav.classList.remove('nav-hidden');
    } else {
      nav.classList.add('nav-hidden');
    }
  });

  // REVEAL ANIMATIONS
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>

</body>
</html>
