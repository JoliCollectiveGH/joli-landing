<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JOLI Collective — Find places to stay</title>
  <link rel="icon" type="image/png" href="https://vzjcbnlsfkpigrdfrifx.supabase.co/storage/v1/object/public/Assets/JOLI_Symbol_Black.png" />
  <meta name="description" content="Too many options. Not enough taste. MILO is an AI travel copilot that finds remarkable, design-led stays across Europe — handpicked for character, not volume." />
  
  <style>
    /* ... [Keeping your existing CSS exactly as you had it] ... */
    @font-face { font-family: 'Monument Grotesk'; src: url('https://vzjcbnlsfkpigrdfrifx.supabase.co/storage/v1/object/public/Assets/ABCMonumentGrotesk-Light-Trial.woff2') format('woff2'); font-weight: 300; }
    @font-face { font-family: 'Monument Grotesk'; src: url('https://vzjcbnlsfkpigrdfrifx.supabase.co/storage/v1/object/public/Assets/ABCMonumentGrotesk-Regular-Trial.woff2') format('woff2'); font-weight: 400; }
    
    :root {
      --brand: #AD531B;
      --brand-dark: #8B4316;
      --brand-light: rgba(173, 83, 27, 0.08);
      --ink: #1A1814;
      --ink-muted: #6B6560;
      --surface: #F7F6F2;
      --white: #FFFFFF;
      --border: rgba(26, 24, 20, 0.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Monument Grotesk', -apple-system, sans-serif; background: var(--surface); color: var(--ink); -webkit-font-smoothing: antialiased; }

    /* MILO RESPONSE OVERLAY - Added for Step 4 */
    #milo-container {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 380px;
      max-height: 500px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      z-index: 999;
      display: none; /* Hidden by default */
      flex-direction: column;
      overflow: hidden;
      animation: fadeUp 0.4s ease forwards;
    }

    #milo-header {
      padding: 16px 20px;
      background: var(--ink);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #milo-body {
      padding: 20px;
      font-size: 14px;
      line-height: 1.6;
      overflow-y: auto;
      color: var(--ink-muted);
    }

    .milo-loading {
      display: inline-block;
      width: 4px;
      height: 4px;
      background: var(--brand);
      border-radius: 50%;
      margin-left: 4px;
      animation: blink 1s infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

    /* [Rest of your existing styles] */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; padding: 0 40px; height: 64px; display: flex; align-items: center; justify-content: space-between; background: rgba(247, 246, 242, 0.88); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--ink); text-align: center; color: white; padding: 40px; }
    .hero-headline { font-size: clamp(32px, 4vw, 58px); margin-bottom: 24px; }
    .btn-primary { cursor: pointer; border: none; padding: 14px 28px; border-radius: 100px; font-weight: 500; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary-light { background: white; color: var(--ink); }
  </style>
</head>
<body>

<div id="milo-container">
  <div id="milo-header">
    <span style="font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;">Milo AI</span>
    <button onclick="document.getElementById('milo-container').style.display='none'" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
  </div>
  <div id="milo-body">
    <div id="milo-text">Waiting for Milo...</div>
  </div>
</div>

<nav id="main-nav">
  <a href="/" class="nav-logo">
    <img src="https://vzjcbnlsfkpigrdfrifx.supabase.co/storage/v1/object/public/Assets/JOLI_Lockup_Black.svg" alt="JOLI Collective" />
  </a>
  <div style="display: flex; gap: 20px;">
    <button onclick="askMilo('Find me a design-led villa in Tuscany')" class="btn-primary" style="font-size: 12px; padding: 10px 20px; background: var(--brand); color: white;">
      Try MILO
    </button>
  </div>
</nav>

<section class="hero" id="hero">
  <p style="color: rgba(255,255,255,0.4); text-transform: uppercase; font-size: 11px; letter-spacing: 0.2em; margin-bottom: 20px;">MILO — A travel copilot</p>
  <h1 class="hero-headline">Find places to stay.<br><i style="color: var(--brand)">Without the scrolling.</i></h1>
  
  <div class="hero-actions">
    <button onclick="askMilo('I want a romantic stay in Tuscany for two')" class="btn-primary btn-primary-light">
      Ask Milo about Tuscany
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>
</section>

<script>
  async function askMilo(query) {
    const container = document.getElementById('milo-container');
    const textField = document.getElementById('milo-text');
    
    // 1. Show the UI
    container.style.display = 'flex';
    textField.innerHTML = 'Milo is searching the collection<span class="milo-loading"></span>';

    try {
      // 2. Call your Vercel API
      const response = await fetch('https://joli-app.vercel.app/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user_message: query,
          anonymous_id: 'visitor_' + Math.random().toString(36).substr(2, 5),
          session_id: 'landing_page_demo'
        }),
      });

      if (!response.ok) throw new Error('Milo is resting.');

      // 3. Handle the Stream
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      textField.innerHTML = ""; // Clear the loading text

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        
        const chunk = decoder.decode(value);
        textField.innerHTML += chunk;
        
        // Auto-scroll to bottom as it types
        container.scrollTop = container.scrollHeight;
      }

    } catch (error) {
      textField.innerHTML = "Sorry, I'm having trouble connecting to the collection. Please try again in a moment.";
      console.error(error);
    }
  }
</script>

</body>
</html>
